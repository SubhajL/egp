services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${EGP_POSTGRES_DB:-egp}
      POSTGRES_USER: ${EGP_POSTGRES_USER:-egp}
      POSTGRES_PASSWORD: ${EGP_POSTGRES_PASSWORD:?set EGP_POSTGRES_PASSWORD in your environment}
    expose:
      - "5432"
    volumes:
      - egp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EGP_POSTGRES_USER:-egp} -d ${EGP_POSTGRES_DB:-egp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    expose:
      - "6379"
    volumes:
      - egp_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${EGP_POSTGRES_USER:-egp}:${EGP_POSTGRES_PASSWORD:?set EGP_POSTGRES_PASSWORD in your environment}@postgres:5432/${EGP_POSTGRES_DB:-egp}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - python
      - -m
      - egp_db.migration_runner
      - --database-url
      - postgresql://${EGP_POSTGRES_USER:-egp}:${EGP_POSTGRES_PASSWORD:?set EGP_POSTGRES_PASSWORD in your environment}@postgres:5432/${EGP_POSTGRES_DB:-egp}
      - --migrations-dir
      - /app/packages/db/src/migrations

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${EGP_POSTGRES_USER:-egp}:${EGP_POSTGRES_PASSWORD:?set EGP_POSTGRES_PASSWORD in your environment}@postgres:5432/${EGP_POSTGRES_DB:-egp}
      EGP_ARTIFACT_ROOT: /var/lib/egp/artifacts
      EGP_ARTIFACT_STORE: ${EGP_ARTIFACT_STORE:-local}
      EGP_PAYMENT_PROVIDER: ${EGP_PAYMENT_PROVIDER:-opn}
      EGP_PAYMENT_CALLBACK_SECRET: ${EGP_PAYMENT_CALLBACK_SECRET:?set EGP_PAYMENT_CALLBACK_SECRET in your environment}
      EGP_AUTH_REQUIRED: ${EGP_AUTH_REQUIRED:-true}
      EGP_JWT_SECRET: ${EGP_JWT_SECRET:?set EGP_JWT_SECRET in your environment}
      EGP_SESSION_COOKIE_SECURE: ${EGP_SESSION_COOKIE_SECURE:-true}
      EGP_SESSION_COOKIE_SAMESITE: ${EGP_SESSION_COOKIE_SAMESITE:-lax}
      EGP_WEB_ALLOWED_ORIGINS: ${EGP_WEB_ALLOWED_ORIGINS:?set EGP_WEB_ALLOWED_ORIGINS in your environment}
      EGP_WEB_BASE_URL: ${EGP_WEB_BASE_URL:?set EGP_WEB_BASE_URL in your environment}
      EGP_INTERNAL_WORKER_TOKEN: ${EGP_INTERNAL_WORKER_TOKEN:?set EGP_INTERNAL_WORKER_TOKEN in your environment}
      EGP_OPN_SECRET_KEY: ${EGP_OPN_SECRET_KEY:-}
      EGP_OPN_PUBLIC_KEY: ${EGP_OPN_PUBLIC_KEY:-}
      EGP_OPN_WEBHOOK_SECRET: ${EGP_OPN_WEBHOOK_SECRET:-}
      EGP_RESEND_API_KEY: ${EGP_RESEND_API_KEY:-}
      EGP_RESEND_FROM: ${EGP_RESEND_FROM:-}
      EGP_SMTP_HOST: ${EGP_SMTP_HOST:-}
      EGP_SMTP_PORT: ${EGP_SMTP_PORT:-587}
      EGP_SMTP_USERNAME: ${EGP_SMTP_USERNAME:-}
      EGP_SMTP_PASSWORD: ${EGP_SMTP_PASSWORD:-}
      EGP_SMTP_FROM: ${EGP_SMTP_FROM:-}
      EGP_SMTP_USE_TLS: ${EGP_SMTP_USE_TLS:-true}
    expose:
      - "8000"
    volumes:
      - egp_artifacts:/var/lib/egp/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_EGP_API_BASE_URL: ${NEXT_PUBLIC_EGP_API_BASE_URL:?set NEXT_PUBLIC_EGP_API_BASE_URL in your environment}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?set NEXT_PUBLIC_SITE_URL in your environment}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_EGP_API_BASE_URL: ${NEXT_PUBLIC_EGP_API_BASE_URL:?set NEXT_PUBLIC_EGP_API_BASE_URL in your environment}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?set NEXT_PUBLIC_SITE_URL in your environment}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      EGP_API_DOMAIN: ${EGP_API_DOMAIN:?set EGP_API_DOMAIN in your environment}
      EGP_APP_DOMAIN: ${EGP_APP_DOMAIN:?set EGP_APP_DOMAIN in your environment}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  egp_pgdata:
  egp_redisdata:
  egp_artifacts:
  caddy_data:
  caddy_config:
