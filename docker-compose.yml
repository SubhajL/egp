services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: egp
      POSTGRES_USER: egp
      POSTGRES_PASSWORD: egp_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/db/src/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
