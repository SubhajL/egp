services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${EGP_POSTGRES_DB:-egp}
      POSTGRES_USER: ${EGP_POSTGRES_USER:-egp}
      POSTGRES_PASSWORD: ${EGP_POSTGRES_PASSWORD:?set EGP_POSTGRES_PASSWORD in your environment}
    expose:
      - "5432"
    volumes:
      - egp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EGP_POSTGRES_USER:-egp} -d ${EGP_POSTGRES_DB:-egp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${EGP_POSTGRES_USER:-egp}:${EGP_POSTGRES_PASSWORD:?set EGP_POSTGRES_PASSWORD in your environment}@postgres:5432/${EGP_POSTGRES_DB:-egp}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - python
      - -m
      - egp_db.migration_runner
      - --database-url
      - postgresql://${EGP_POSTGRES_USER:-egp}:${EGP_POSTGRES_PASSWORD:?set EGP_POSTGRES_PASSWORD in your environment}@postgres:5432/${EGP_POSTGRES_DB:-egp}
      - --migrations-dir
      - /app/packages/db/src/migrations

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${EGP_POSTGRES_USER:-egp}:${EGP_POSTGRES_PASSWORD:?set EGP_POSTGRES_PASSWORD in your environment}@postgres:5432/${EGP_POSTGRES_DB:-egp}
      EGP_ARTIFACT_ROOT: /var/lib/egp/artifacts
      EGP_ARTIFACT_STORE: ${EGP_ARTIFACT_STORE:-local}
      # Object-store creds for the artifacts the API serves to the UI. Must be
      # declared here or the container can't reach the store (compose env is
      # per-service, not passed wholesale). Default backend is Cloudflare R2
      # (s3); Supabase vars are the optional fallback. See docs/REMOTE_LOCAL_CRAWLER.md.
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_ENDPOINT_URL_S3: ${AWS_ENDPOINT_URL_S3:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-}
      EGP_PAYMENT_PROVIDER: ${EGP_PAYMENT_PROVIDER:-opn}
      EGP_PAYMENT_CALLBACK_SECRET: ${EGP_PAYMENT_CALLBACK_SECRET:?set EGP_PAYMENT_CALLBACK_SECRET in your environment}
      EGP_AUTH_REQUIRED: ${EGP_AUTH_REQUIRED:-true}
      EGP_JWT_SECRET: ${EGP_JWT_SECRET:?set EGP_JWT_SECRET in your environment}
      EGP_SESSION_COOKIE_SECURE: ${EGP_SESSION_COOKIE_SECURE:-true}
      EGP_SESSION_COOKIE_SAMESITE: ${EGP_SESSION_COOKIE_SAMESITE:-lax}
      EGP_WEB_ALLOWED_ORIGINS: ${EGP_WEB_ALLOWED_ORIGINS:?set EGP_WEB_ALLOWED_ORIGINS in your environment}
      EGP_WEB_BASE_URL: ${EGP_WEB_BASE_URL:?set EGP_WEB_BASE_URL in your environment}
      EGP_INTERNAL_WORKER_TOKEN: ${EGP_INTERNAL_WORKER_TOKEN:?set EGP_INTERNAL_WORKER_TOKEN in your environment}
      EGP_OPN_SECRET_KEY: ${EGP_OPN_SECRET_KEY:-}
      EGP_OPN_PUBLIC_KEY: ${EGP_OPN_PUBLIC_KEY:-}
      EGP_OPN_WEBHOOK_SECRET: ${EGP_OPN_WEBHOOK_SECRET:-}
      # Manual PromptPay (promptpay_manual) + LINE OA slip verification. These
      # must be declared here or the container never receives them (the compose
      # --env-file flag only feeds interpolation, not the container environment).
      EGP_PROMPTPAY_PROXY_ID: ${EGP_PROMPTPAY_PROXY_ID:-}
      EGP_LINE_CHANNEL_SECRET: ${EGP_LINE_CHANNEL_SECRET:-}
      EGP_LINE_CHANNEL_ACCESS_TOKEN: ${EGP_LINE_CHANNEL_ACCESS_TOKEN:-}
      EGP_LINE_ADMIN_USER_IDS: ${EGP_LINE_ADMIN_USER_IDS:-}
      EGP_LINE_ADD_URL: ${EGP_LINE_ADD_URL:-}
      EGP_ADMIN_CONSOLE_BASE_URL: ${EGP_ADMIN_CONSOLE_BASE_URL:-}
      EGP_RESEND_API_KEY: ${EGP_RESEND_API_KEY:-}
      EGP_RESEND_FROM: ${EGP_RESEND_FROM:-}
      EGP_SMTP_HOST: ${EGP_SMTP_HOST:-}
      EGP_SMTP_PORT: ${EGP_SMTP_PORT:-587}
      EGP_SMTP_USERNAME: ${EGP_SMTP_USERNAME:-}
      EGP_SMTP_PASSWORD: ${EGP_SMTP_PASSWORD:-}
      EGP_SMTP_FROM: ${EGP_SMTP_FROM:-}
      EGP_SMTP_USE_TLS: ${EGP_SMTP_USE_TLS:-true}
      EGP_BACKGROUND_RUNTIME_MODE: ${EGP_BACKGROUND_RUNTIME_MODE:-external}
      EGP_CRAWLER_HEARTBEAT_STALE_AFTER_SECONDS: ${EGP_CRAWLER_HEARTBEAT_STALE_AFTER_SECONDS:-90}
      EGP_DISCOVERY_LEASE_SECONDS: ${EGP_DISCOVERY_LEASE_SECONDS:-60}
      EGP_DISCOVERY_LEASE_HEARTBEAT_SECONDS: ${EGP_DISCOVERY_LEASE_HEARTBEAT_SECONDS:-20}
      EGP_BROWSER_CDP_PORT_BASE: ${EGP_BROWSER_CDP_PORT_BASE:-9222}
      EGP_BROWSER_CDP_PORT_RANGE: ${EGP_BROWSER_CDP_PORT_RANGE:-200}
      EGP_BROWSER_PROFILE_ROOT: ${EGP_BROWSER_PROFILE_ROOT:-~/.egp/profiles}
    expose:
      - "8000"
    volumes:
      - egp_artifacts:/var/lib/egp/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  webhook-executor:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${EGP_POSTGRES_USER:-egp}:${EGP_POSTGRES_PASSWORD:?set EGP_POSTGRES_PASSWORD in your environment}@postgres:5432/${EGP_POSTGRES_DB:-egp}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
      - python
      - -m
      - egp_api.executors.webhook_delivery
    # Background worker (no HTTP server): the apps/api/Dockerfile HEALTHCHECK
    # curls :8000/health, which never succeeds here and reports a permanent
    # false 'unhealthy'. Disable it — the container running-state already
    # reflects worker liveness (PID 1 is the worker; if it exits the container
    # stops and is restarted by `restart: unless-stopped`).
    healthcheck:
      disable: true

  discovery-executor:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${EGP_POSTGRES_USER:-egp}:${EGP_POSTGRES_PASSWORD:?set EGP_POSTGRES_PASSWORD in your environment}@postgres:5432/${EGP_POSTGRES_DB:-egp}
      EGP_ARTIFACT_ROOT: /var/lib/egp/artifacts
      EGP_ARTIFACT_STORE: ${EGP_ARTIFACT_STORE:-local}
      # Object-store creds (R2 default / Supabase optional) — the worker uploads
      # downloaded TOR documents here. Declared explicitly (compose env is
      # per-service). See docs/REMOTE_LOCAL_CRAWLER.md.
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_ENDPOINT_URL_S3: ${AWS_ENDPOINT_URL_S3:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-}
      EGP_DISCOVERY_WORKER_COUNT: ${EGP_DISCOVERY_WORKER_COUNT:-1}
      EGP_DISCOVERY_LEASE_SECONDS: ${EGP_DISCOVERY_LEASE_SECONDS:-60}
      EGP_DISCOVERY_LEASE_HEARTBEAT_SECONDS: ${EGP_DISCOVERY_LEASE_HEARTBEAT_SECONDS:-20}
      EGP_INTERNAL_API_BASE_URL: http://api:8000
      EGP_INTERNAL_WORKER_TOKEN: ${EGP_INTERNAL_WORKER_TOKEN:?set EGP_INTERNAL_WORKER_TOKEN in your environment}
      EGP_CRAWLER_AGENT_ID: inbox-discovery-executor
      EGP_CRAWLER_HEARTBEAT_INTERVAL_SECONDS: ${EGP_CRAWLER_HEARTBEAT_INTERVAL_SECONDS:-30}
      EGP_BROWSER_CDP_PORT_BASE: ${EGP_BROWSER_CDP_PORT_BASE:-9222}
      EGP_BROWSER_CDP_PORT_RANGE: ${EGP_BROWSER_CDP_PORT_RANGE:-200}
      EGP_BROWSER_PROFILE_ROOT: ${EGP_BROWSER_PROFILE_ROOT:-~/.egp/profiles}
      # Headful Chrome under Xvfb (this is a Linux container with no display).
      EGP_BROWSER_USE_XVFB: ${EGP_BROWSER_USE_XVFB:-true}
      # Outbound proxy for headful Chrome (creds-free; points at proxy-relay
      # when enabled). EMPTY by default = no proxy = current behavior. Set to
      # http://proxy-relay:8118 in /etc/egp/egp.env at the activation step.
      EGP_BROWSER_PROXY_SERVER: ${EGP_BROWSER_PROXY_SERVER:-}
      # Persistent warmed-profile mode (PR 3) + search-step timeout knobs (PR 2a).
      # All default to current behavior; set in /etc/egp/egp.env at activation.
      EGP_BROWSER_PROFILE_MODE: ${EGP_BROWSER_PROFILE_MODE:-per_run}
      EGP_BROWSER_PERSISTENT_PROFILE_DIR: ${EGP_BROWSER_PERSISTENT_PROFILE_DIR:-}
      EGP_BROWSER_NAV_TIMEOUT_MS: ${EGP_BROWSER_NAV_TIMEOUT_MS:-60000}
      EGP_BROWSER_CLOUDFLARE_TIMEOUT_MS: ${EGP_BROWSER_CLOUDFLARE_TIMEOUT_MS:-120000}
      EGP_BROWSER_CLOUDFLARE_RELOAD_RETRIES: ${EGP_BROWSER_CLOUDFLARE_RELOAD_RETRIES:-1}
      EGP_BROWSER_PROJECT_DETAIL_TIMEOUT_S: ${EGP_BROWSER_PROJECT_DETAIL_TIMEOUT_S:-240}
    volumes:
      - egp_artifacts:/var/lib/egp/artifacts
      # Warmed persistent Chrome profile (PR 3) — survives container recreation.
      # Inert in per_run mode; used only when EGP_BROWSER_PROFILE_MODE=persistent.
      - egp_browser_profile:/var/lib/egp/browser-profile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
      - python
      - -m
      - egp_api.executors.discovery_dispatch
    # Background worker (no HTTP server): disable the inherited :8000/health
    # probe (see webhook-executor above) — container running-state reflects
    # worker liveness.
    healthcheck:
      disable: true

  # Local creds-free auth-relay (gost) -> upstream residential proxy.
  # OFF by default (profile "proxy"): a plain `docker compose up` never starts it.
  # Enable only at the activation step, after setting EGP_PROXY_UPSTREAM_URL
  # (http://USER:PASS@host:port) in /etc/egp/egp.env, via `--profile proxy up`.
  # Chrome in discovery-executor then reaches it creds-free at proxy-relay:8118.
  proxy-relay:
    profiles: ["proxy"]
    image: ginuerzh/gost
    restart: unless-stopped
    command:
      - "-L=http://:8118"
      - "-F=${EGP_PROXY_UPSTREAM_URL:-}"

  web:
    # Frontend service for single-host launches only.
    # Production deploys use Vercel — see docs/VERCEL_DEPLOYMENT.md.
    # `docker compose up -d` keeps this service down; pass
    # `--profile single-host` to include it.
    profiles: ["single-host"]
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_EGP_API_BASE_URL: ${NEXT_PUBLIC_EGP_API_BASE_URL:?set NEXT_PUBLIC_EGP_API_BASE_URL in your environment}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?set NEXT_PUBLIC_SITE_URL in your environment}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_EGP_API_BASE_URL: ${NEXT_PUBLIC_EGP_API_BASE_URL:?set NEXT_PUBLIC_EGP_API_BASE_URL in your environment}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?set NEXT_PUBLIC_SITE_URL in your environment}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      EGP_API_DOMAIN: ${EGP_API_DOMAIN:?set EGP_API_DOMAIN in your environment}
      EGP_APP_DOMAIN: ${EGP_APP_DOMAIN:?set EGP_APP_DOMAIN in your environment}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

volumes:
  egp_pgdata:
  egp_artifacts:
  egp_browser_profile:
  caddy_data:
  caddy_config:
