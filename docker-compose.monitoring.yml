# Observability overlay (PR-E)
#
# Bring up Prometheus + Grafana alongside the base stack:
#   docker compose --env-file /etc/egp/egp.env \
#       -f docker-compose.yml \
#       -f docker-compose.monitoring.yml \
#       up -d
#
# Both services bind to 127.0.0.1 only. Access Grafana via SSH tunnel:
#   ssh -L 3001:127.0.0.1:3000 user@lightsail-host
#   → open http://localhost:3001 in your browser
#
# Full operator runbook: docs/OBSERVABILITY.md
# Secret rotation:       docs/SECRET_ROTATION.md §10

services:
  prometheus:
    image: prom/prometheus:v3.11.3
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - egp_prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${EGP_GRAFANA_ADMIN_PASSWORD:?set EGP_GRAFANA_ADMIN_PASSWORD in your environment}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - egp_grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  egp_prometheus_data:
    name: egp_prometheus_data
  egp_grafana_data:
    name: egp_grafana_data
