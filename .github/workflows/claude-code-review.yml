name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this PR for code quality, potential bugs, security issues, and adherence to project conventions.

            Key conventions for this project (from CLAUDE.md):
            - Python type hints on all function signatures
            - TypeScript strict mode
            - All database queries must be scoped by tenant_id (multi-tenant)
            - SHA-256 hashing for all document artifacts
            - Never write tor_downloaded = Yes as fake closure
            - PostgreSQL is source of truth, not Excel
            - Crawler workers emit events only; API owns state

            Focus on actionable feedback. Be concise.

      - name: Report advisory Claude review failure
        if: steps.claude-review.outcome != 'success'
        run: |
          echo "::warning title=Claude review unavailable::Claude review is advisory and did not complete successfully. Check the workflow logs and repository secret configuration."
