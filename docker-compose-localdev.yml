services:
  postgres:
    image: postgres:15-alpine
    container_name: egp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${EGP_POSTGRES_DB:-egp}
      POSTGRES_USER: ${EGP_POSTGRES_USER:-egp}
      POSTGRES_PASSWORD: ${EGP_POSTGRES_PASSWORD:-egp_dev}
    ports:
      - "${EGP_POSTGRES_PORT:-5434}:5432"
    volumes:
      - egp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EGP_POSTGRES_USER:-egp} -d ${EGP_POSTGRES_DB:-egp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: egp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${EGP_REDIS_PORT:-6380}:6379"
    volumes:
      - egp_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: egp-migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${EGP_POSTGRES_USER:-egp}:${EGP_POSTGRES_PASSWORD:-egp_dev}@postgres:5432/${EGP_POSTGRES_DB:-egp}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - python
      - -m
      - egp_db.migration_runner
      - --database-url
      - postgresql://${EGP_POSTGRES_USER:-egp}:${EGP_POSTGRES_PASSWORD:-egp_dev}@postgres:5432/${EGP_POSTGRES_DB:-egp}
      - --migrations-dir
      - /app/packages/db/src/migrations

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: egp-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${EGP_POSTGRES_USER:-egp}:${EGP_POSTGRES_PASSWORD:-egp_dev}@postgres:5432/${EGP_POSTGRES_DB:-egp}
      EGP_ARTIFACT_ROOT: /var/lib/egp/artifacts
      EGP_ARTIFACT_STORE: local
      EGP_PAYMENT_PROVIDER: ${EGP_PAYMENT_PROVIDER:-mock_promptpay}
      EGP_PAYMENT_CALLBACK_SECRET: ${EGP_PAYMENT_CALLBACK_SECRET:-top-secret}
      EGP_OPN_SECRET_KEY: ${EGP_OPN_SECRET_KEY:-}
      EGP_OPN_PUBLIC_KEY: ${EGP_OPN_PUBLIC_KEY:-}
      EGP_OPN_WEBHOOK_SECRET: ${EGP_OPN_WEBHOOK_SECRET:-}
      EGP_AUTH_REQUIRED: ${EGP_AUTH_REQUIRED:-false}
      EGP_JWT_SECRET: ${EGP_JWT_SECRET:-dev-jwt-secret}
      EGP_SESSION_COOKIE_SECURE: ${EGP_SESSION_COOKIE_SECURE:-false}
      EGP_WEB_ALLOWED_ORIGINS: http://127.0.0.1:${EGP_WEB_PORT:-3002},http://localhost:${EGP_WEB_PORT:-3002}
      EGP_WEB_BASE_URL: http://127.0.0.1:${EGP_WEB_PORT:-3002}
      EGP_INTERNAL_WORKER_TOKEN: ${EGP_INTERNAL_WORKER_TOKEN:-dev-internal-worker-token}
      EGP_BACKGROUND_RUNTIME_MODE: ${EGP_BACKGROUND_RUNTIME_MODE:-external}
    ports:
      - "${EGP_API_PORT:-8010}:8000"
    volumes:
      - egp_artifacts:/var/lib/egp/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  webhook-executor:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: egp-webhook-executor
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${EGP_POSTGRES_USER:-egp}:${EGP_POSTGRES_PASSWORD:-egp_dev}@postgres:5432/${EGP_POSTGRES_DB:-egp}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
      - python
      - -m
      - egp_api.executors.webhook_delivery

  discovery-executor:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: egp-discovery-executor
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${EGP_POSTGRES_USER:-egp}:${EGP_POSTGRES_PASSWORD:-egp_dev}@postgres:5432/${EGP_POSTGRES_DB:-egp}
      EGP_ARTIFACT_ROOT: /var/lib/egp/artifacts
      EGP_ARTIFACT_STORE: local
    volumes:
      - egp_artifacts:/var/lib/egp/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
      - python
      - -m
      - egp_api.executors.discovery_dispatch

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_EGP_API_BASE_URL: http://127.0.0.1:${EGP_API_PORT:-8010}
        NEXT_PUBLIC_SITE_URL: http://127.0.0.1:${EGP_WEB_PORT:-3002}
    container_name: egp-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_EGP_API_BASE_URL: http://127.0.0.1:${EGP_API_PORT:-8010}
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:${EGP_WEB_PORT:-3002}
    ports:
      - "${EGP_WEB_PORT:-3002}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  egp_pgdata:
  egp_redisdata:
  egp_artifacts:
