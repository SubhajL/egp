AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: OPN webhook ingress Lambda for e-GP billing settlement

Parameters:
  DatabaseUrl:
    Type: String
    Default: ''
    NoEcho: true
    Description: Optional direct SQLAlchemy DATABASE_URL (leave blank when using Secrets Manager or SSM)
  OpnSecretKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: Optional direct OPN secret key (leave blank when using Secrets Manager or SSM)
  OpnPublicKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: Optional direct OPN public key
  OpnWebhookSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: Optional OPN webhook secret (base64) for Omise-Signature verification
  ConfigSecretArn:
    Type: String
    Default: ''
    Description: Optional Secrets Manager secret ARN containing JSON keys database_url, opn_secret_key, and optional opn_public_key/opn_webhook_secret
  ConfigSsmParameterName:
    Type: String
    Default: ''
    Description: Optional SSM parameter name containing the same JSON object as ConfigSecretArn
  LambdaMemorySize:
    Type: Number
    Default: 512
  LambdaTimeoutSeconds:
    Type: Number
    Default: 30
  PrivateSubnetIds:
    Type: CommaDelimitedList
    Description: Private subnet IDs with database reachability
  LambdaSecurityGroupIds:
    Type: CommaDelimitedList
    Description: Security groups that allow egress to the database

Conditions:
  HasConfigSecretArn: !Not [!Equals [!Ref ConfigSecretArn, '']]
  HasConfigSsmParameterName: !Not [!Equals [!Ref ConfigSsmParameterName, '']]

Resources:
  OpnWebhookHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod

  OpnWebhookFunction:
    Type: AWS::Serverless::Function
    Metadata:
      DockerContext: ../..
      Dockerfile: apps/api/Dockerfile.lambda-opn-webhook
      DockerTag: opn-webhook-lambda
    Properties:
      PackageType: Image
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeoutSeconds
      Architectures:
        - x86_64
      Policies:
        - AWSLambdaBasicExecutionRole
        - !If
          - HasConfigSecretArn
          - Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref ConfigSecretArn
          - !Ref AWS::NoValue
        - !If
          - HasConfigSsmParameterName
          - Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: '*'
          - !Ref AWS::NoValue
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          EGP_PAYMENT_PROVIDER: opn
          EGP_OPN_SECRET_KEY: !Ref OpnSecretKey
          EGP_OPN_PUBLIC_KEY: !Ref OpnPublicKey
          EGP_OPN_WEBHOOK_SECRET: !Ref OpnWebhookSecret
          EGP_LAMBDA_CONFIG_SECRET_ARN: !Ref ConfigSecretArn
          EGP_LAMBDA_CONFIG_SSM_PARAMETER: !Ref ConfigSsmParameterName
      VpcConfig:
        SecurityGroupIds: !Ref LambdaSecurityGroupIds
        SubnetIds: !Ref PrivateSubnetIds
      Events:
        OpnWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref OpnWebhookHttpApi
            Path: /v1/billing/providers/opn/webhooks
            Method: POST

Outputs:
  OpnWebhookUrl:
    Description: Public HTTPS webhook endpoint to configure in OPN
    Value: !Sub https://${OpnWebhookHttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod/v1/billing/providers/opn/webhooks
